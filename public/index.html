<!DOCTYPE html>
<html>
<head>
    <title>Мой Мессенджер</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        #app {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* Форма входа */
        #login-section {
            padding: 40px;
            text-align: center;
        }
        
        #login-section h2 {
            margin-bottom: 30px;
            color: #333;
        }
        
        #login-section input {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            margin: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #login-section button {
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: transform 0.2s;
        }
        
        #login-section button:hover {
            transform: scale(1.05);
        }
        
        /* Чат */
        #chat-section {
            display: flex;
            height: 80vh;
        }
        
        .sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
        }
        
        .sidebar h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .sidebar input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .sidebar button {
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .current-chat {
            margin-top: 15px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        
        .my-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .other-message {
            background: #f1f3f4;
            color: #333;
        }
        
        .message strong {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .chat-form {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
        }
        
        .chat-form input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .chat-form button {
            padding: 10px 20px;
            margin-left: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .user-info {
            padding: 15px;
            background: #667eea;
            color: white;
            text-align: center;
/* Аватарки */
.message-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 10px 0;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    color: white;
    flex-shrink: 0;
}

.avatar-small {
    width: 32px;
    height: 32px;
    font-size: 14px;
}

.message-content {
    flex: 1;
    max-width: 70%;
}

.my-message .message-content {
    margin-left: auto;
}

.message-bubble {
    padding: 10px 15px;
    border-radius: 10px;
    word-wrap: break-word;
}

.my-message .message-bubble {
    background: #667eea;
    color: white;
}

.other-message .message-bubble {
    background: #f1f3f4;
    color: #333;
}

.message-time {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
    text-align: right;
}

.message-name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 4px;
    color: #666;
}
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- Форма входа -->
            <div id="login-section">
                <h2>📱 Вход в мессенджер</h2>
                <input type="text" id="username" placeholder="Логин">
                <input type="password" id="password" placeholder="Пароль">
                <br>
                <button onclick="login()">Войти</button>
                <button onclick="register()">Зарегистрироваться</button>
            </div>

            <!-- Чат -->
            <div id="chat-section" style="display: none;">
                <div class="sidebar">
                    <h3>💬 Собеседник</h3>
                    <input type="text" id="recipient" placeholder="Имя пользователя">
                    <div style="margin-top: 20px;">
    <h4>👥 Все пользователи</h4>
    <div id="users-list" style="max-height: 200px; overflow-y: auto; margin-top: 10px;">
        <div style="text-align: center; color: #999;">Загрузка...</div>
    </div>
</div>
<button onclick="setRecipient()">Выбрать</button>
                    <div class="current-chat">
                        <strong>Чат с:</strong> <span id="current-chat">никем</span>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="user-info">
                        Добро пожаловать, <span id="current-user"></span>
                    </div>
                    <div class="messages" id="messages"></div>
                    <form class="chat-form" onsubmit="sendMessage(event)">
                        <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                        <button type="submit">📤 Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
// Получить список всех пользователей
async function loadUsers() {
    try {
        const response = await fetch('/users');
        const users = await response.json();
        const usersListDiv = document.getElementById('users-list');
        
        if (users.length === 0) {
            usersListDiv.innerHTML = '<div style="text-align: center; color: #999;">Нет пользователей</div>';
            return;
        }
        
        usersListDiv.innerHTML = users.map(user => `
    <div class="user-item" onclick="selectUser('${user.username}')" 
         style="padding: 8px; margin: 5px 0; background: #f0f0f0; border-radius: 8px; cursor: pointer;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="avatar" style="width: 30px; height: 30px; font-size: 14px; 
                 background: ${getAvatarColor(user.username)};">
                ${user.username.charAt(0).toUpperCase()}
            </div>
            <span>${user.username}</span>
            ${onlineUsers.includes(user.username) ? '<span style="color: #4caf50; font-size: 12px;"> ●</span>' : ''}
        </div>
    </div>
`).join('');
    } catch (err) {
        console.error('Ошибка загрузки пользователей:', err);
    }
}

// Функция для цвета аватарки
function getAvatarColor(username) {
    const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
    const index = username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
    return colors[index];
}

// Выбрать пользователя для чата
function selectUser(username) {
    if (username === currentUser) {
        alert('Нельзя писать самому себе');
        return;
    }
    document.getElementById('recipient').value = username;
    setRecipient();
}
        // Определяем адрес сервера (автоматически подставляется текущий адрес)
        const serverUrl = window.location.origin;
        const socket = io(serverUrl);
        
        let currentUser = null;
        let currentRecipient = null;

        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите');
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                currentUser = username;
                document.getElementById('current-user').innerText = currentUser;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                
                socket.emit('join', currentUser);
            } else {
                alert('Ошибка входа: неверный логин или пароль');
            }
        }

        function setRecipient() {
            const recip = document.getElementById('recipient').value;
            if (recip && recip !== currentUser) {
                currentRecipient = recip;
                document.getElementById('current-chat').innerText = currentRecipient;
                document.getElementById('messages').innerHTML = '';
                
                socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
            } else if (recip === currentUser) {
                alert('Нельзя писать самому себе');
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            const message = document.getElementById('message-input').value;
            
            if (message && currentRecipient) {
                socket.emit('private message', {
                    to: currentRecipient,
                    from: currentUser,
                    message: message
                });
                document.getElementById('message-input').value = '';
            } else if (!currentRecipient) {
                alert('Сначала выберите собеседника');
            }
        }

      socket.on('message history', (data) => {
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML = '';
    data.messages.forEach(msg => {
        displayMessage(msg.sender, msg.message, msg.sender === currentUser, msg.timestamp);
    });
});
socket.on('private message', (data) => {
    if (data.from === currentRecipient) {
        displayMessage(data.from, data.message, false, data.timestamp);
    } else {
        if (confirm(`Новое сообщение от ${data.from}. Перейти в чат?`)) {
            currentRecipient = data.from;
            document.getElementById('recipient').value = data.from;
            document.getElementById('current-chat').innerText = data.from;
            document.getElementById('messages').innerHTML = '';
            socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
            displayMessage(data.from, data.message, false, data.timestamp);
        }
    }
});

        socket.on('message sent', (data) => {
    if (data.to === currentRecipient) {
        displayMessage(currentUser, data.message, true, data.timestamp);
    }
});

        function displayMessage(sender, text, isMe, timestamp = null) {
    const messagesDiv = document.getElementById('messages');
    const messageWrapper = document.createElement('div');
    messageWrapper.classList.add('message-wrapper');
    
    // Форматирование времени
    let timeStr = '';
    if (timestamp) {
        const date = new Date(timestamp);
        timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } else {
        timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // Цвет для аватарки (на основе имени)
    const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
    const colorIndex = sender.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
    const avatarColor = colors[colorIndex];
    const firstLetter = sender.charAt(0).toUpperCase();
    
    // Аватарка
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    if (!isMe) avatar.classList.add('avatar-small');
    avatar.style.backgroundColor = avatarColor;
    avatar.textContent = firstLetter;
    
    // Контент сообщения
    const messageContent = document.createElement('div');
    messageContent.className = 'message-content';
    
    const messageBubble = document.createElement('div');
    messageBubble.className = 'message-bubble';
    messageBubble.innerHTML = text.replace(/\n/g, '<br>');
    
    const messageTime = document.createElement('div');
    messageTime.className = 'message-time';
    messageTime.textContent = timeStr;
    
    const messageName = document.createElement('div');
    messageName.className = 'message-name';
    if (!isMe) {
        messageName.textContent = sender;
    }
    
    messageContent.appendChild(messageName);
    messageContent.appendChild(messageBubble);
    messageContent.appendChild(messageTime);
    
    // Расположение
    if (isMe) {
        messageWrapper.appendChild(messageContent);
        messageWrapper.appendChild(avatar);
        messageWrapper.style.justifyContent = 'flex-end';
    } else {
        messageWrapper.appendChild(avatar);
        messageWrapper.appendChild(messageContent);
    }
    
    messagesDiv.appendChild(messageWrapper);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
    </script>
</body>
</html>
