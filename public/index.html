<!DOCTYPE html>
<html>
<head>
    <title>Мой Мессенджер</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Emoji Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
        }
        
        /* Форма входа */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .login-box h2 {
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        
        .login-box button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .login-box button:last-of-type {
            background: #48bb78;
        }
        
        .login-box button:last-of-type:hover {
            background: #38a169;
        }
        
        /* Чат */
        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
        }
        
        .sidebar-header h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .sidebar-header input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .sidebar-header button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .users-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .users-section h4 {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 5px 0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e9ecef;
        }
        
        .user-item:hover {
            background: #f1f3f5;
            transform: translateX(4px);
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
            background: #667eea;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: #333;
        }
        
        .user-status {
            font-size: 12px;
            color: #4caf50;
            margin-top: 4px;
        }
        
        .user-status.offline {
            color: #999;
        }
        
        .current-chat-info {
            padding: 15px;
            background: #e9ecef;
            margin: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        
        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            background: #667eea;
        }
        
        .chat-header-info h3 {
            font-size: 18px;
            color: #333;
        }
        
        .chat-header-info p {
            font-size: 13px;
            color: #4caf50;
            margin-top: 4px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
        }
        
        .message-wrapper.my-message {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            background: #667eea;
        }
        
        .message-content {
            max-width: 60%;
        }
        
        .my-message .message-content {
            text-align: right;
        }
        
        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        .my-message .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .other-message .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #666;
        }
        
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            background: white;
        }
        
        .chat-input-form {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .input-wrapper {
            flex: 1;
        }
        
        .chat-input-form input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        
        .chat-input-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .chat-input-form button {
            padding: 14px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .chat-input-form button:hover {
            background: #5a67d8;
        }
        
        .emoji-button {
            background: #f0f0f0;
            border: none;
            border-radius: 24px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s;
        }
        
        .emoji-button:hover {
            background: #e0e0e0;
        }
        
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 1000;
            display: none;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 350px;
            height: 400px;
        }
        
        .emoji-picker.show {
            display: block;
        }
        
        /* Скроллбар */
        .messages-area::-webkit-scrollbar,
        .users-section::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-area::-webkit-scrollbar-track,
        .users-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .messages-area::-webkit-scrollbar-thumb,
        .users-section::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .avatar-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .avatar-section h4 {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .avatar-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #current-avatar {
            width: 48px;
            height: 48px;
            font-size: 28px;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        #change-avatar-btn {
            flex: 1;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Форма входа -->
        <div id="login-section" class="login-container">
            <div class="login-box">
                <h2>💬 Мессенджер</h2>
                <input type="text" id="username" placeholder="Логин">
                <input type="password" id="password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <button onclick="register()">Зарегистрироваться</button>
            </div>
        </div>

        <!-- Чат -->
        <div id="chat-section" class="chat-container" style="display: none;">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>💬 Новый диалог</h3>
                    <input type="text" id="recipient" placeholder="Введите имя пользователя">
                    <button onclick="setRecipient()">Начать чат</button>
                </div>
                <div class="users-section">
                    <h4>👥 Активные чаты</h4>
                    <div id="users-list">
                        <div style="text-align: center; color: #999; padding: 20px;">Загрузка...</div>
                    </div>
                </div>
                <div class="avatar-section">
                    <h4>🎨 Мой аватар</h4>
                    <div class="avatar-selector">
                        <div id="current-avatar" class="user-avatar" style="width: 48px; height: 48px; font-size: 28px;">😊</div>
                        <button id="change-avatar-btn">Сменить эмодзи</button>
                    </div>
                </div>
                <div class="current-chat-info">
                    <strong>Текущий чат:</strong> <span id="current-chat-name">не выбран</span>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header" id="chat-header" style="display: none;">
                    <div class="chat-header-avatar" id="chat-header-avatar"></div>
                    <div class="chat-header-info">
                        <h3 id="chat-header-name"></h3>
                        <p id="chat-header-status">Выберите собеседника</p>
                    </div>
                </div>
                <div class="messages-area" id="messages">
                    <div style="text-align: center; color: #999; padding: 40px;">Выберите собеседника, чтобы начать общение</div>
                </div>
                <div class="chat-input-area">
                    <form class="chat-input-form" onsubmit="sendMessage(event)">
                        <button type="button" class="emoji-button" id="emoji-btn">😊</button>
                        <div class="input-wrapper">
                            <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                        </div>
                        <button type="submit">📤 Отправить</button>
                    </form>
                    <div class="emoji-picker" id="emoji-picker"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const serverUrl = window.location.origin;
        const socket = io(serverUrl);
        
        let currentUser = null;
        let currentRecipient = null;
        let onlineUsers = [];
        let unreadCount = 0;
        let originalTitle = document.title;
        let notificationPermission = false;

        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите');
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                currentUser = username;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                
                socket.emit('join', currentUser);
                loadUsers();
                
                // Загружаем аватарку текущего пользователя
                loadCurrentAvatar();
                
                // Запрашиваем разрешение на уведомления
                requestNotificationPermission();
            } else {
                alert('Ошибка входа: неверный логин или пароль');
            }
        }
        
        async function loadCurrentAvatar() {
            const emoji = await getUserAvatar(currentUser);
            const avatarDiv = document.getElementById('current-avatar');
            if (avatarDiv) {
                avatarDiv.textContent = emoji;
            }
        }

        function setRecipient() {
            const recip = document.getElementById('recipient').value.trim();
            if (recip && recip !== currentUser) {
                currentRecipient = recip;
                document.getElementById('current-chat-name').innerText = currentRecipient;
                document.getElementById('messages').innerHTML = '';
                document.getElementById('chat-header').style.display = 'flex';
                document.getElementById('chat-header-name').innerText = currentRecipient;
                updateChatHeaderAvatar(currentRecipient);
                socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
                
                unreadCount = 0;
                updateUnreadCount();
            } else if (recip === currentUser) {
                alert('Нельзя писать самому себе');
            }
        }

        function updateChatHeaderAvatar(username) {
            const avatar = document.getElementById('chat-header-avatar');
            if (avatar && username) {
                getUserAvatar(username).then(emoji => {
                    avatar.textContent = emoji;
                    avatar.style.backgroundColor = 'transparent';
                });
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            const message = document.getElementById('message-input').value.trim();
            
            if (message && currentRecipient) {
                socket.emit('private message', {
                    to: currentRecipient,
                    from: currentUser,
                    message: message
                });
                document.getElementById('message-input').value = '';
            } else if (!currentRecipient) {
                alert('Сначала выберите собеседника');
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`/users?currentUser=${encodeURIComponent(currentUser)}`);
                const users = await response.json();
                const usersListDiv = document.getElementById('users-list');
                
                if (users.length === 0) {
                    usersListDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Нет активных чатов. Напишите кому-нибудь!</div>';
                    return;
                }
                
                usersListDiv.innerHTML = users.map(user => {
                    const isOnline = onlineUsers.includes(user);
                    return `
                        <div class="user-item" onclick="selectUser('${user}')">
                            <div class="user-avatar" data-username="${user}">😊</div>
                            <div class="user-info">
                                <div class="user-name">${user}</div>
                                <div class="user-status ${isOnline ? '' : 'offline'}">${isOnline ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Загружаем реальные аватарки
                for (const user of users) {
                    const avatarDiv = document.querySelector(`.user-avatar[data-username="${user}"]`);
                    if (avatarDiv) {
                        const emoji = await getUserAvatar(user);
                        avatarDiv.textContent = emoji;
                        avatarDiv.style.backgroundColor = 'transparent';
                    }
                }
            } catch (err) {
                console.error('Ошибка загрузки контактов:', err);
                document.getElementById('users-list').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Ошибка загрузки</div>';
            }
        }

        async function getUserAvatar(username) {
            try {
                const response = await fetch(`/avatar/${username}`);
                const data = await response.json();
                return data.emoji;
            } catch (err) {
                console.error('Ошибка загрузки аватарки:', err);
                return '😊';
            }
        }
        
        async function setUserAvatar(emoji) {
            try {
                await fetch('/avatar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, emoji })
                });
            } catch (err) {
                console.error('Ошибка сохранения аватарки:', err);
            }
        }

        function selectUser(username) {
            if (username === currentUser) {
                alert('Нельзя писать самому себе');
                return;
            }
            document.getElementById('recipient').value = username;
            setRecipient();
        }

        function updateOnlineStatus() {
            loadUsers();
            if (currentRecipient) {
                const statusText = onlineUsers.includes(currentRecipient) ? '🟢 В сети' : '⚫ Не в сети';
                document.getElementById('chat-header-status').innerHTML = statusText;
            }
        }
        
        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    notificationPermission = permission === 'granted';
                });
            }
        }
        
        function showNotification(sender, message) {
            if (!notificationPermission) return;
            if (document.hasFocus() && document.getElementById('current-chat-name').innerText === sender) {
                return;
            }
            
            const notification = new Notification(`📩 Новое сообщение от ${sender}`, {
                body: message.length > 50 ? message.slice(0, 50) + '...' : message,
                icon: 'https://cdn-icons-png.flaticon.com/512/134/134914.png',
                silent: false
            });
            
            notification.onclick = () => {
                window.focus();
                if (sender !== currentUser) {
                    selectUser(sender);
                }
                notification.close();
            };
            
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.3;
            audio.play().catch(e => console.log('Звук не воспроизведен:', e));
        }
        
        function updateUnreadCount() {
            if (unreadCount > 0) {
                document.title = `(${unreadCount}) ${originalTitle}`;
            } else {
                document.title = originalTitle;
            }
        }

        socket.on('message history', (data) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            if (data.messages.length === 0) {
                messagesDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
            }
            data.messages.forEach(msg => {
                displayMessage(msg.sender, msg.message, msg.sender === currentUser, msg.timestamp);
            });
        });

        socket.on('private message', (data) => {
            if (data.from === currentRecipient) {
                displayMessage(data.from, data.message, false, data.timestamp);
                unreadCount = 0;
                updateUnreadCount();
            } else {
                unreadCount++;
                updateUnreadCount();
                showNotification(data.from, data.message);
                
                if (confirm(`Новое сообщение от ${data.from}. Перейти в чат?`)) {
                    unreadCount = 0;
                    updateUnreadCount();
                    currentRecipient = data.from;
                    document.getElementById('recipient').value = data.from;
                    document.getElementById('current-chat-name').innerText = data.from;
                    document.getElementById('messages').innerHTML = '';
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('chat-header-name').innerText = data.from;
                    updateChatHeaderAvatar(data.from);
                    socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
                    displayMessage(data.from, data.message, false, data.timestamp);
                    loadUsers();
                }
            }
        });

        socket.on('message sent', (data) => {
            if (data.to === currentRecipient) {
                displayMessage(currentUser, data.message, true, data.timestamp);
                loadUsers();
                unreadCount = 0;
                updateUnreadCount();
            }
        });

        socket.on('online users', (users) => {
            onlineUsers = users;
            updateOnlineStatus();
        });

        async function displayMessage(sender, text, isMe, timestamp = null) {
            const messagesDiv = document.getElementById('messages');
            
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].textContent.includes('Нет сообщений')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('message-wrapper');
            if (isMe) messageWrapper.classList.add('my-message');
            else messageWrapper.classList.add('other-message');
            
            let timeStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            const avatarEmoji = await getUserAvatar(sender);
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.style.backgroundColor = '#667eea';
            avatar.style.display = 'flex';
            avatar.style.alignItems = 'center';
            avatar.style.justifyContent = 'center';
            avatar.style.fontSize = '18px';
            avatar.textContent = avatarEmoji;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const messageName = document.createElement('div');
            messageName.className = 'message-name';
            if (!isMe) {
                messageName.textContent = sender;
            }
            
            const messageBubble = document.createElement('div');
            messageBubble.className = 'message-bubble';
            messageBubble.innerHTML = text.replace(/\n/g, '<br>');
            
            const messageTime = document.createElement('div');
            messageTime.className = 'message-time';
            messageTime.textContent = timeStr;
            
            messageContent.appendChild(messageName);
            messageContent.appendChild(messageBubble);
            messageContent.appendChild(messageTime);
            
            if (isMe) {
                messageWrapper.appendChild(messageContent);
                messageWrapper.appendChild(avatar);
            } else {
                messageWrapper.appendChild(avatar);
                messageWrapper.appendChild(messageContent);
            }
            
            messagesDiv.appendChild(messageWrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Смайлики
        let emojiPicker = null;
        
        function initEmojiPicker() {
            const pickerElement = document.getElementById('emoji-picker');
            const emojiBtn = document.getElementById('emoji-btn');
            
            if (window.EmojiPicker) {
                emojiPicker = new window.EmojiPicker({
                    dataSource: 'https://cdn.jsdelivr.net/npm/emoji-picker-element-data@1.2.0/emojibase/data.json',
                    locale: 'ru'
                });
                pickerElement.appendChild(emojiPicker);
                
                emojiPicker.addEventListener('emoji-click', (event) => {
                    const emoji = event.detail.unicode;
                    const input = document.getElementById('message-input');
                    input.value += emoji;
                    input.focus();
                    pickerElement.classList.remove('show');
                });
            }
            
            emojiBtn.addEventListener('click', () => {
                pickerElement.classList.toggle('show');
            });
            
            document.addEventListener('click', (e) => {
                if (!pickerElement.contains(e.target) && e.target !== emojiBtn) {
                    pickerElement.classList.remove('show');
                }
            });
        }
        
        // Выбор аватарки
        let avatarPicker = null;
        
        function initAvatarPicker() {
            const avatarBtn = document.getElementById('change-avatar-btn');
            const avatarContainer = document.getElementById('current-avatar');
            
            if (window.EmojiPicker && !avatarPicker) {
                avatarPicker = new window.EmojiPicker({
                    dataSource: 'https://cdn.jsdelivr.net/npm/emoji-picker-element-data@1.2.0/emojibase/data.json',
                    locale: 'ru'
                });
                
                avatarPicker.style.position = 'absolute';
                avatarPicker.style.top = '50%';
                avatarPicker.style.left = '50%';
                avatarPicker.style.transform = 'translate(-50%, -50%)';
                avatarPicker.style.zIndex = '1001';
                avatarPicker.style.display = 'none';
                document.body.appendChild(avatarPicker);
                
                avatarPicker.addEventListener('emoji-click', async (event) => {
                    const emoji = event.detail.unicode;
                    await setUserAvatar(emoji);
                    avatarContainer.textContent = emoji;
                    avatarPicker.style.display = 'none';
                    loadUsers();
                    if (currentRecipient) {
                        updateChatHeaderAvatar(currentRecipient);
                    }
                });
            }
            
            avatarBtn.addEventListener('click', () => {
                if (avatarPicker) {
                    avatarPicker.style.display = avatarPicker.style.display === 'none' ? 'block' : 'none';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (avatarPicker && !avatarPicker.contains(e.target) && e.target !== avatarBtn) {
                    avatarPicker.style.display = 'none';
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initEmojiPicker();
            initAvatarPicker();
        });
    </script>
</body>
</html>
