<!DOCTYPE html>
<html>
<head>
    <title>Мой Мессенджер</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
        }
        
        /* Форма входа */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .login-box h2 {
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        
        .login-box button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .login-box button:last-of-type {
            background: #48bb78;
        }
        
        .login-box button:last-of-type:hover {
            background: #38a169;
        }
        
        /* Чат */
        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
        }
        
        .sidebar-header h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .sidebar-header input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .sidebar-header button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .users-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .users-section h4 {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 5px 0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e9ecef;
        }
        
        .user-item:hover {
            background: #f1f3f5;
            transform: translateX(4px);
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: #333;
        }
        
        .user-status {
            font-size: 12px;
            color: #4caf50;
            margin-top: 4px;
        }
        
        .user-status.offline {
            color: #999;
        }
        
        .current-chat-info {
            padding: 15px;
            background: #e9ecef;
            margin: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        
        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
        }
        
        .chat-header-info h3 {
            font-size: 18px;
            color: #333;
        }
        
        .chat-header-info p {
            font-size: 13px;
            color: #4caf50;
            margin-top: 4px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
        }
        
        .message-wrapper.my-message {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }
        
        .message-content {
            max-width: 60%;
        }
        
        .my-message .message-content {
            text-align: right;
        }
        
        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        .my-message .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .other-message .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #666;
        }
        
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            background: white;
        }
        
        .chat-input-form {
            display: flex;
            gap: 12px;
        }
        
        .chat-input-form input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        
        .chat-input-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .chat-input-form button {
            padding: 14px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .chat-input-form button:hover {
            background: #5a67d8;
        }
        
        /* Скроллбар */
        .messages-area::-webkit-scrollbar,
        .users-section::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-area::-webkit-scrollbar-track,
        .users-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .messages-area::-webkit-scrollbar-thumb,
        .users-section::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Форма входа -->
        <div id="login-section" class="login-container">
            <div class="login-box">
                <h2>💬 Мессенджер</h2>
                <input type="text" id="username" placeholder="Логин">
                <input type="password" id="password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <button onclick="register()">Зарегистрироваться</button>
            </div>
        </div>

        <!-- Чат -->
        <div id="chat-section" class="chat-container" style="display: none;">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>💬 Новый диалог</h3>
                    <input type="text" id="recipient" placeholder="Введите имя пользователя">
                    <button onclick="setRecipient()">Начать чат</button>
                </div>
                <div class="users-section">
                    <h4>👥 Все пользователи</h4>
                    <div id="users-list">
                        <div style="text-align: center; color: #999; padding: 20px;">Загрузка...</div>
                    </div>
                </div>
                <div class="current-chat-info" id="current-chat-info">
                    <strong>Текущий чат:</strong> <span id="current-chat-name">не выбран</span>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header" id="chat-header" style="display: none;">
                    <div class="chat-header-avatar" id="chat-header-avatar"></div>
                    <div class="chat-header-info">
                        <h3 id="chat-header-name"></h3>
                        <p id="chat-header-status">Выберите собеседника</p>
                    </div>
                </div>
                <div class="messages-area" id="messages">
                    <div style="text-align: center; color: #999; padding: 40px;">Выберите собеседника, чтобы начать общение</div>
                </div>
                <div class="chat-input-area">
                    <form class="chat-input-form" onsubmit="sendMessage(event)">
                        <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                        <button type="submit">📤 Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const serverUrl = window.location.origin;
        const socket = io(serverUrl);
        
        let currentUser = null;
        let currentRecipient = null;
        let onlineUsers = [];

        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите');
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (data.success) {
                currentUser = username;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                
                socket.emit('join', currentUser);
                loadUsers();
            } else {
                alert('Ошибка входа: неверный логин или пароль');
            }
        }

        function setRecipient() {
            const recip = document.getElementById('recipient').value.trim();
            if (recip && recip !== currentUser) {
                currentRecipient = recip;
                document.getElementById('current-chat-name').innerText = currentRecipient;
                document.getElementById('messages').innerHTML = '';
                document.getElementById('chat-header').style.display = 'flex';
                document.getElementById('chat-header-name').innerText = currentRecipient;
                updateChatHeaderAvatar(currentRecipient);
                socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
            } else if (recip === currentUser) {
                alert('Нельзя писать самому себе');
            }
        }

        function updateChatHeaderAvatar(username) {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
            const index = username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
            const avatar = document.getElementById('chat-header-avatar');
            avatar.style.backgroundColor = colors[index];
            avatar.textContent = username.charAt(0).toUpperCase();
        }

        function sendMessage(event) {
            event.preventDefault();
            const message = document.getElementById('message-input').value.trim();
            
            if (message && currentRecipient) {
                socket.emit('private message', {
                    to: currentRecipient,
                    from: currentUser,
                    message: message
                });
                document.getElementById('message-input').value = '';
            } else if (!currentRecipient) {
                alert('Сначала выберите собеседника');
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch('/users');
                const users = await response.json();
                const usersListDiv = document.getElementById('users-list');
                
                if (users.length === 0) {
                    usersListDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Нет пользователей</div>';
                    return;
                }
                
                const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
                
                usersListDiv.innerHTML = users.map(user => {
                    const colorIndex = user.username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
                    const isOnline = onlineUsers.includes(user.username);
                    return `
                        <div class="user-item" onclick="selectUser('${user.username}')">
                            <div class="user-avatar" style="background: ${colors[colorIndex]}">
                                ${user.username.charAt(0).toUpperCase()}
                            </div>
                            <div class="user-info">
                                <div class="user-name">${user.username}</div>
                                <div class="user-status ${isOnline ? '' : 'offline'}">${isOnline ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Ошибка загрузки пользователей:', err);
                document.getElementById('users-list').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Ошибка загрузки</div>';
            }
        }

        function getAvatarColor(username) {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
            const index = username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
            return colors[index];
        }

        function selectUser(username) {
            if (username === currentUser) {
                alert('Нельзя писать самому себе');
                return;
            }
            document.getElementById('recipient').value = username;
            setRecipient();
        }

        function updateOnlineStatus() {
            loadUsers();
            if (currentRecipient) {
                const statusText = onlineUsers.includes(currentRecipient) ? '🟢 В сети' : '⚫ Не в сети';
                document.getElementById('chat-header-status').innerHTML = statusText;
            }
        }

        socket.on('message history', (data) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            if (data.messages.length === 0) {
                messagesDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
            }
            data.messages.forEach(msg => {
                displayMessage(msg.sender, msg.message, msg.sender === currentUser, msg.timestamp);
            });
        });

        socket.on('private message', (data) => {
            if (data.from === currentRecipient) {
                displayMessage(data.from, data.message, false, data.timestamp);
            } else {
                if (confirm(`Новое сообщение от ${data.from}. Перейти в чат?`)) {
                    currentRecipient = data.from;
                    document.getElementById('recipient').value = data.from;
                    document.getElementById('current-chat-name').innerText = data.from;
                    document.getElementById('messages').innerHTML = '';
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('chat-header-name').innerText = data.from;
                    updateChatHeaderAvatar(data.from);
                    socket.emit('get history', { withUser: currentRecipient, currentUser: currentUser });
                    displayMessage(data.from, data.message, false, data.timestamp);
                }
            }
        });

        socket.on('message sent', (data) => {
            if (data.to === currentRecipient) {
                displayMessage(currentUser, data.message, true, data.timestamp);
            }
        });

        socket.on('online users', (users) => {
            onlineUsers = users;
            updateOnlineStatus();
        });

        function displayMessage(sender, text, isMe, timestamp = null) {
            const messagesDiv = document.getElementById('messages');
            
            // Убираем заглушку если есть
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].textContent.includes('Нет сообщений')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('message-wrapper');
            if (isMe) messageWrapper.classList.add('my-message');
            else messageWrapper.classList.add('other-message');
            
            let timeStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
            const colorIndex = sender.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
            const avatarColor = colors[colorIndex];
            const firstLetter = sender.charAt(0).toUpperCase();
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.style.backgroundColor = avatarColor;
            avatar.textContent = firstLetter;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const messageName = document.createElement('div');
            messageName.className = 'message-name';
            if (!isMe) {
                messageName.textContent = sender;
            }
            
            const messageBubble = document.createElement('div');
            messageBubble.className = 'message-bubble';
            messageBubble.innerHTML = text.replace(/\n/g, '<br>');
            
            const messageTime = document.createElement('div');
            messageTime.className = 'message-time';
            messageTime.textContent = timeStr;
            
            messageContent.appendChild(messageName);
            messageContent.appendChild(messageBubble);
            messageContent.appendChild(messageTime);
            
            if (isMe) {
                messageWrapper.appendChild(messageContent);
                messageWrapper.appendChild(avatar);
            } else {
                messageWrapper.appendChild(avatar);
                messageWrapper.appendChild(messageContent);
            }
            
            messagesDiv.appendChild(messageWrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
